<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEST LOG — STATISTICS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/pixel.css">
<link rel="manifest" href="../manifest.json">
<style>

  .bar-chart { display:flex; align-items:flex-end; gap:8px; height:120px; }
  .bar-col { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
  .bar-fill {
    background: linear-gradient(0deg, var(--purple-bright), var(--gold));
    width:100%;
    min-height:4px;
    transition: height 0.6s ease;
    position: relative;
  }
  .bar-fill::after {
    content: attr(data-val);
    position:absolute;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
    font-size:7px;
    color:var(--gold);
    white-space:nowrap;
  }
  .bar-label { font-size:7px; color:var(--text-dim); }
  .stat-card { background:var(--card-bg); border:3px solid var(--gold-dark); padding:20px; text-align:center; }
  .stat-card-num { font-size:28px; color:var(--gold); text-shadow:0 0 15px rgba(255,215,0,0.4); }
  .stat-card-label { font-size:7px; color:var(--text-dim); margin-top:6px; }
</style>
</head>
<body>
<div class="scanlines"></div>

<nav class="nav-pixel">
  <div style="display:flex; align-items:center; gap:15px;">
    <button id="menu-toggle" class="btn-pixel" style="padding:8px 12px; font-size:20px; background:transparent; border-color:rgba(255,215,0,0.3);">☰</button>
    <a href="../index.html" class="nav-logo">
      <span style="font-size:24px;">⚔️</span>
      <span>QUEST<br><span style="color:var(--purple-glow);font-size:10px;">LOG</span></span>
    </a>
  </div>

  <div class="nav-player-wrap">
    <div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="nav-level-badge" id="nav-level">LV--</span>
        <span style="font-size:8px;color:var(--gold);" id="nav-name">---</span>
      </div>
      <div class="nav-xp-mini" style="margin-top:4px;" id="nav-xp-text">0/0 XP</div>
      <div class="xp-bar-wrap" style="height:6px;margin-top:3px;width:120px;">
        <div class="xp-bar-fill" id="nav-xp-fill" style="width:0%;"></div>
      </div>
    </div>
    <div style="font-family:'VT323';font-size:18px;color:var(--gold);" id="nav-gold">💰 0G</div>
  </div>
</nav>

<div class="page-container" style="padding-top: 80px;">
  <div class="page-header">
    <h1 class="pixel-title">📊 HERO STATISTICS</h1>
    <p class="pixel-subtitle">Your adventuring record in full detail</p>
  </div>

  <!-- Big Stats -->
  <div class="grid-4 section-gap">
    <div class="stat-card pixel-border">
      <div class="stat-card-num" id="stat-done">0</div>
      <div class="stat-card-label">⚔️ QUESTS COMPLETED</div>
    </div>
    <div class="stat-card pixel-border">
      <div class="stat-card-num" id="stat-xp">0</div>
      <div class="stat-card-label">✨ TOTAL XP EARNED</div>
    </div>
    <div class="stat-card pixel-border">
      <div class="stat-card-num" id="stat-gold">0</div>
      <div class="stat-card-label">💰 TOTAL GOLD EARNED</div>
    </div>
    <div class="stat-card pixel-border">
      <div class="stat-card-num" id="stat-level">0</div>
      <div class="stat-card-label">⭐ CURRENT LEVEL</div>
    </div>
  </div>

  <div class="grid-2 section-gap">
    <!-- 7-Day Activity Chart -->
    <div class="pixel-panel">
      <h3 class="pixel-title" style="font-size:11px;margin-bottom:24px;">📅 LAST 7 DAYS</h3>
      <div class="bar-chart" id="activity-chart">
        <!-- injected by js -->
      </div>
      <div style="display:flex;gap:20px;margin-top:16px;">
        <div><div style="font-size:18px;color:var(--gold);font-family:'VT323';" id="week-total">0</div><div style="font-size:7px;color:var(--text-dim);">THIS WEEK</div></div>
        <div><div style="font-size:18px;color:var(--gold);font-family:'VT323';" id="day-avg">0</div><div style="font-size:7px;color:var(--text-dim);">AVG/DAY</div></div>
      </div>
    </div>

    <!-- Category breakdown -->
    <div class="pixel-panel">
      <h3 class="pixel-title" style="font-size:11px;margin-bottom:20px;">🎯 BY CATEGORY</h3>
      <div id="category-stats-container" style="display:flex;flex-direction:column;gap:10px;">
        <!-- injected by js -->
      </div>
    </div>
  </div>

  <div class="grid-2 section-gap">
    <!-- Difficulty breakdown -->
    <div class="pixel-panel">
      <h3 class="pixel-title" style="font-size:11px;margin-bottom:20px;">⚔️ BY DIFFICULTY</h3>
      <div id="difficulty-stats-container">
        <!-- injected by js -->
      </div>
    </div>

    <!-- Personal Records -->
    <div class="pixel-panel">
      <h3 class="pixel-title" style="font-size:11px;margin-bottom:20px;">🏅 PERSONAL RECORDS</h3>
      <div id="records-container">
        <!-- injected by js -->
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="module">
  import { db } from '../assets/js/db.js';
  window.db = db;
</script>
<script type="module" src="../assets/js/pixel.js"></script>
<script type="module" src="../assets/js/stats.js"></script>
</body>
</html>
